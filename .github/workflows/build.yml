name: Build MiMo-Code for All Platforms

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (留空使用自动版本)'
        required: false
        default: ''

  # 推送标签或分支时触发
  push:
    tags:
      - 'v*'
    branches:
      - 'feature/cross-platform-build'

jobs:
  # ===========================================
  # 构建 macOS 版本
  # ===========================================
  build-macos:
    runs-on: macos-latest
    name: Build macOS

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Build CLI for macOS
        run: |
          cd packages/opencode
          bun run script/build.ts --single

      - name: Build Desktop for macOS
        run: |
          cd packages/desktop
          bun run build
          bun run package:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            packages/opencode/dist/mimocode-darwin-*/
            packages/desktop/release/*.dmg
            packages/desktop/release/*.zip
          retention-days: 30

  # ===========================================
  # 构建 Linux 版本
  # ===========================================
  build-linux:
    runs-on: ubuntu-latest
    name: Build Linux

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Build CLI for Linux
        run: |
          cd packages/opencode
          bun run script/build.ts --single

      - name: Build Desktop for Linux
        run: |
          cd packages/desktop
          bun run build
          bun run package:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: |
            packages/opencode/dist/mimocode-linux-*/
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.deb
          retention-days: 30

  # ===========================================
  # 构建 Windows 版本
  # ===========================================
  build-windows:
    runs-on: windows-latest
    name: Build Windows

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Build CLI for Windows
        run: |
          cd packages/opencode
          bun run script/build.ts --single

      - name: Build Desktop for Windows
        run: |
          cd packages/desktop
          bun run build
          bun run package:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            packages/opencode/dist/mimocode-windows-*/
            packages/desktop/release/*.exe
          retention-days: 30

  # ===========================================
  # 汇总所有构建产物
  # ===========================================
  collect-artifacts:
    runs-on: ubuntu-latest
    name: Collect All Artifacts
    needs: [build-macos, build-linux, build-windows]

    steps:
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build
          path: ./output/macos

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: ./output/linux

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: ./output/windows

      - name: List all artifacts
        run: |
          echo "=== macOS ==="
          find ./output/macos -type f -name "*.dmg" -o -name "*.zip" -o -name "mimo" | head -20
          echo ""
          echo "=== Linux ==="
          find ./output/linux -type f -name "*.AppImage" -o -name "*.deb" -o -name "mimo" | head -20
          echo ""
          echo "=== Windows ==="
          find ./output/windows -type f -name "*.exe" -o -name "mimo.exe" | head -20

      - name: Upload all artifacts
        uses: actions/upload-artifact@v4
        with:
          name: all-platforms
          path: ./output/
          retention-days: 90

  # ===========================================
  # 创建 Release (仅在推送标签时)
  # ===========================================
  create-release:
    runs-on: ubuntu-latest
    name: Create Release
    needs: [collect-artifacts]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          name: all-platforms
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./release/macos/**/*.dmg
            ./release/macos/**/*.zip
            ./release/linux/**/*.AppImage
            ./release/linux/**/*.deb
            ./release/windows/**/*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
