name: Build MiMo-Code for All Platforms

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (留空使用自动版本)'
        required: false
        default: ''

  # 推送标签或分支时触发
  push:
    tags:
      - 'v*'
    branches:
      - 'feature/cross-platform-build'

jobs:
  # ===========================================
  # 构建 macOS CLI + Desktop
  # ===========================================
  build-macos:
    runs-on: macos-latest
    name: Build macOS
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Build CLI for macOS (all targets)
        run: |
          cd packages/opencode
          bun run script/build.ts

      - name: Build Desktop for macOS
        run: |
          cd packages/desktop
          bun run build
          bun run package:mac

      - name: Upload macOS CLI binaries
        uses: actions/upload-artifact@v4
        with:
          name: macos-cli-binaries
          path: packages/opencode/dist/mimocode-darwin-*.zip
          retention-days: 30

      - name: Upload macOS Desktop installer
        uses: actions/upload-artifact@v4
        with:
          name: macos-desktop
          path: |
            packages/desktop/release/*.dmg
            packages/desktop/release/*.zip
          retention-days: 30

  # ===========================================
  # 构建 Linux CLI + Desktop
  # ===========================================
  build-linux:
    runs-on: ubuntu-latest
    name: Build Linux
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Build CLI for Linux (all targets)
        run: |
          cd packages/opencode
          bun run script/build.ts

      - name: Build Desktop for Linux
        run: |
          cd packages/desktop
          bun run build
          bun run package:linux

      - name: Upload Linux CLI binaries
        uses: actions/upload-artifact@v4
        with:
          name: linux-cli-binaries
          path: packages/opencode/dist/mimocode-linux-*.tar.gz
          retention-days: 30

      - name: Upload Linux Desktop installer
        uses: actions/upload-artifact@v4
        with:
          name: linux-desktop
          path: |
            packages/desktop/release/*.AppImage
            packages/desktop/release/*.deb
          retention-days: 30

  # ===========================================
  # 构建 Windows CLI + Desktop
  # ===========================================
  build-windows:
    runs-on: windows-latest
    name: Build Windows
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: bun install

      - name: Build CLI for Windows (all targets)
        run: |
          cd packages/opencode
          bun run script/build.ts

      - name: Build Desktop for Windows
        run: |
          cd packages/desktop
          bun run build
          bun run package:win

      - name: Upload Windows CLI binaries
        uses: actions/upload-artifact@v4
        with:
          name: windows-cli-binaries
          path: packages/opencode/dist/mimocode-windows-*.zip
          retention-days: 30

      - name: Upload Windows Desktop installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-desktop
          path: packages/desktop/release/*.exe
          retention-days: 30

  # ===========================================
  # 创建 Release (仅在推送标签时)
  # ===========================================
  create-release:
    runs-on: ubuntu-latest
    name: Create Release
    needs: [build-macos, build-linux, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download macOS CLI binaries
        uses: actions/download-artifact@v4
        with:
          name: macos-cli-binaries
          path: ./release

      - name: Download Linux CLI binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-cli-binaries
          path: ./release

      - name: Download Windows CLI binaries
        uses: actions/download-artifact@v4
        with:
          name: windows-cli-binaries
          path: ./release

      - name: Download macOS Desktop installer
        uses: actions/download-artifact@v4
        with:
          name: macos-desktop
          path: ./release

      - name: Download Linux Desktop installer
        uses: actions/download-artifact@v4
        with:
          name: linux-desktop
          path: ./release

      - name: Download Windows Desktop installer
        uses: actions/download-artifact@v4
        with:
          name: windows-desktop
          path: ./release

      - name: List all release files
        run: find ./release -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ./release/mimocode-darwin-*.zip
            ./release/mimocode-linux-*.tar.gz
            ./release/mimocode-win-*.zip
            ./release/MiMoCode-*.dmg
            ./release/MiMoCode-*.zip
            ./release/MiMoCode-*.AppImage
            ./release/MiMoCode-*.deb
            ./release/MiMoCode-*.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
