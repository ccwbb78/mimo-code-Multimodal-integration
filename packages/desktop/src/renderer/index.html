<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; media-src 'self' data:; connect-src 'self' data: ws: wss: http: https:;"
    />
    <title>MiMoCode</title>
    <script>
      // Theme preload — runs before app to prevent flash
      ;(function () {
        try {
          var t = localStorage.getItem("opencode.global.dat:theme")
          if (t === "light") document.documentElement.classList.add("light")
        } catch (_) {}
      })()
      // Expose writable __OPENCODE__ object for the app
      window.__OPENCODE__ = {
        updaterEnabled: true,
        deepLinks: [],
        wsl: false,
      }
    </script>
  </head>
  <body>
    <div id="root" class="flex flex-col h-dvh p-px"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
